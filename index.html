  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --teal-glow: rgba(0,255,224,0.18);
    --purple: #b44fff;
    --purple-glow: rgba(180,79,255,0.18);

    --bg: #050508;
    --card-bg: #0b0b14;
    --border: #1a1a2e;
    --text: #b0b0cc;
    --white: #ffffff;
    --muted: #555570;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: #000;
    border-bottom: 2px solid transparent;
    border-image: linear-gradient(90deg, var(--teal), var(--purple)) 1;
    padding: 18px 24px 14px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .logo-badge {
    width: 200px;
    height: 200px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  .logo-badge img {
    width: 90%;
    height: 90%;
    object-fit: contain;
    display: block;
  }

  .logo-fallback {
    font-family: 'Barlow Condensed', sans-serif;
    font-style: italic;
    font-weight: 800;
    font-size: 22px;
    background: linear-gradient(135deg, var(--teal), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .header-text { flex: 1; }

  .brand-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-style: italic;
    font-weight: 800;
    font-size: clamp(26px, 5vw, 38px);
    background: linear-gradient(90deg, var(--teal) 0%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .brand-tagline {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-contact {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    line-height: 1.7;
  }

  .header-contact a { color: var(--teal); text-decoration: none; }

  /* ── CONTROLS ── */
  .controls {
    background: #08080f;
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .controls-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }

  #search {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px 10px 38px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--teal); }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 4px;
    flex-shrink: 0;
  }

  .cat-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .cat-btn:hover { border-color: var(--teal); color: var(--teal); }

  .cat-btn.active {
    background: var(--teal-glow);
    border-color: var(--teal);
    color: var(--teal);
  }

  .cat-btn[data-cat="all"].active {
    background: linear-gradient(135deg, var(--teal-glow), var(--purple-glow));
    border-color: var(--purple);
    color: var(--white);
  }

  .results-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    flex-shrink: 0;
  }

  /* ── GRID ── */
  .catalog-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .product-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
  }

  .product-card:hover {
    border-color: var(--teal);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,255,224,0.08);
  }

  .card-img-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #0f0f1a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .img-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 100%;
    padding: 16px;
  }

  .img-placeholder .sku-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    word-break: break-all;
  }

  .placeholder-icon {
    width: 36px;
    height: 36px;
    opacity: 0.2;
  }

  .card-body {
    padding: 12px 14px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-sku {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--teal);
    letter-spacing: 0.06em;
    opacity: 0.7;
  }

  .card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--white);
    line-height: 1.2;
    flex: 1;
  }

  .card-pricing {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-top: 4px;
  }

  .price-wholesale {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--teal);
  }

  .price-retail {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: line-through;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .badge-moq {
    background: rgba(180,79,255,0.15);
    border: 1px solid rgba(180,79,255,0.35);
    color: var(--purple);
  }

  .badge-cat {
    background: rgba(0,255,224,0.08);
    border: 1px solid rgba(0,255,224,0.18);
    color: rgba(0,255,224,0.6);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: none;
    text-align: center;
    padding: 60px 24px;
    grid-column: 1 / -1;
  }

  .empty-state.visible { display: block; }

  .empty-state p {
    font-family: 'Barlow Condensed', sans-serif;
    font-style: italic;
    font-size: 20px;
    color: var(--muted);
  }

  /* ── FOOTER ── */

    margin-top: 48px;
    display: flex;
    height: 36px;
  }

  .footer-teal {
    flex: 1;
    background: var(--teal);
    display: flex;
    align-items: center;
    padding: 0 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #030a08;

    background: var(--purple);

    align-items: center;
    justify-content: flex-end;

    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  /* ── RESPONSIVE ── */

    .site-header { padding: 14px 16px; }
    .header-contact { display: none; }
    .controls { padding: 12px 16px; }
    .catalog-wrap { padding: 16px; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .card-name { font-size: 14px; }
  }
</style>
</head>

let activeCategory = "all";
let searchQuery = "";

const grid = document.getElementById("grid");
const empty = document.getElementById("empty");
const searchInput = document.getElementById("search");
const countEl = document.getElementById("results-count");

function fmt(n) {
  return "$" + n.toFixed(2);
}

function createCard(p) {
  const card = document.createElement("div");
  card.className = "product-card";

  const imgWrap = document.createElement("div");
  imgWrap.className = "card-img-wrap";

  const img = document.createElement("img");
  img.alt = p.name;
  img.loading = "lazy";
  img.src = "./images/" + p.sku + ".PNG";
  img.onerror = function() {
    imgWrap.innerHTML = `
      <div class="img-placeholder">
        <svg class="placeholder-icon" viewBox="0 0 36 36" fill="none">
          <rect x="4" y="6" width="28" height="24" rx="3" stroke="#00ffe0" stroke-width="1.5"/>
          <circle cx="13" cy="15" r="3" stroke="#00ffe0" stroke-width="1.5"/>
          <path d="M4 26l8-7 6 6 4-4 10 9" stroke="#00ffe0" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="sku-text">${p.sku}</span>
      </div>`;
  };
  imgWrap.appendChild(img);

  const body = document.createElement("div");
  body.className = "card-body";

  body.innerHTML = `
    <div class="card-sku">${p.sku}</div>
    <div class="card-name">${p.name}</div>
    <div class="card-pricing">
      <span class="price-wholesale">${fmt(p.wholesale)}</span>
      ${p.retail ? `<span class="price-retail">${fmt(p.retail)}</span>` : ""}
    </div>
    <div class="card-footer">
      ${p.moq ? `<span class="badge badge-moq">MOQ ${p.moq}</span>` : ""}
      <span class="badge badge-cat">${p.cat}</span>
    </div>`;

  card.appendChild(imgWrap);
  card.appendChild(body);
  return card;
}

function render() {
  const q = searchQuery.toLowerCase().trim();
  const filtered = PRODUCTS.filter(p => {
    const matchCat = activeCategory === "all" || p.cat === activeCategory;
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  while (grid.firstChild && grid.firstChild !== empty) {
    grid.removeChild(grid.firstChild);
  }

  if (filtered.length === 0) {
    empty.classList.add("visible");
  } else {
    empty.classList.remove("visible");
    filtered.forEach(p => grid.insertBefore(createCard(p), empty));
  }

  countEl.textContent = filtered.length + " of " + PRODUCTS.length + " items";
}

document.querySelectorAll(".cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.cat;
    render();
  });
});

searchInput.addEventListener("input", e => {
  searchQuery = e.target.value;
  render();
});

render();
</script>
